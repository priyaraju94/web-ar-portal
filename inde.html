<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-aframe.prod.js"></script>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>

<a-scene
mindar-image="imageTargetSrc: targets.mind"
color-space="sRGB"
renderer="colorManagement: true, physicallyCorrectLights"
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: true"
>

<a-assets>

<img id="portal" src="portal.png">

<a-asset-item id="model" src="scene.gltf"></a-asset-item>

</a-assets>

<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

<a-entity mindar-image-target="targetIndex: 0">

<a-plane src="#portal" position="0 0 0" height="1" width="1"></a-plane>

<a-gltf-model src="#model" position="0 0 -1" scale="0.3 0.3 0.3"></a-gltf-model>

</a-entity>

</a-scene>

</body>
</html>
